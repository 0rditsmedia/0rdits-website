<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stills Archive | 0rdits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Media Protection CSS */
        img,
        video {
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        :root {
            --premium-ease: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            opacity: 0;
            transform: scale(0.95);
            animation: pageEntry 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @keyframes pageEntry {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        body.lightbox-open {
            overflow: hidden;
        }

        .euro-style {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            transform: scaleX(1.1);
            display: inline-block;
            transform-origin: center;
        }

        .header {
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header.nav-hidden {
            transform: translateY(-100%);
        }

        .back-btn {
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            opacity: 1;
            transform: translateY(-50%) translateX(-5px);
        }

        .catalog-grid {
            column-count: 4;
            column-gap: 1.5rem;
            padding: 3rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .grid-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            background: #0a0a0a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .grid-item:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            transition: opacity 1s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .grid-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: zoom-out;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 4px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
        }

        .lightbox-close {
            position: fixed;
            top: 30px;
            right: 30px;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2002;
            opacity: 0.5;
        }

        .lightbox-close:hover { opacity: 1; }

        @media (max-width: 1024px) {
            .catalog-grid { column-count: 3; }
        }

        @media (max-width: 768px) {
            .catalog-grid { column-count: 2; column-gap: 1rem; padding: 2rem 1rem; }
            .header { padding: 2.5rem 1rem; }
            .header h1 { font-size: 1.8rem; }
            .back-btn { position: relative; left: 0; top: 0; transform: none; margin-bottom: 2rem; justify-content: center; }
        }

        @media (max-width: 480px) {
            .catalog-grid { column-count: 2; column-gap: 0.8rem; }
            .grid-item { margin-bottom: 0.8rem; }
        }

        .footer {
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div class="content-wrapper">
        <header class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <h1 class="euro-style">Stills Catalog</h1>
        </header>

        <main class="catalog-grid" id="catalogGrid"></main>

        <footer class="footer">
            © 2026 ORDITS. ALL RIGHTS RESERVED. ENGINEERED FOR AUTHORITY.
        </footer>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-close"><i class="fas fa-times"></i></div>
        <div class="lightbox-content">
            <img src="" alt="" class="lightbox-img">
        </div>
    </div>

    <script>
        const photos = [
            "photo1/_AIS0424.jpg", "photo1/_AIS9022.jpg", "photo1/_AIS9090.jpg", "photo1/_AIS9097-Enhanced-NR.jpg", "photo1/_AIS9141-Enhanced-NR.jpg", "photo1/_AIS9150.jpg", "photo1/_AIS9155.jpg", "photo1/_AIS9159-Enhanced-NR.jpg", "photo1/_AIS9310-Enhanced-NR.jpg", "photo1/_AIS9338.jpg", "photo1/_AIS9786.jpg", "photo1/_AIS9808.jpg", "photo1/_AIS9821.jpg", "photo1/_AIS9845.jpg", "photo1/_AIS9853.jpg",
            "photo2/AIS01709.jpg", "photo2/AIS01723.jpg", "photo2/AIS01734.jpg", "photo2/AIS01776.jpg", "photo2/AIS01802-2.jpg", "photo2/AIS01826-2.jpg", "photo2/AIS01889-2.jpg", "photo2/AIS01892-2.jpg", "photo2/AIS01943-Enhanced-NR-3.jpg", "photo2/DSC00024-Enhanced-NR.jpg", "photo2/DSC00052.jpg", "photo2/DSC00701-Enhanced-NR.jpg", "photo2/DSC00706.jpg", "photo2/DSC00800-Enhanced-NR.jpg", "photo2/DSC00808.jpg",
            "photo3/DSC00870.jpg", "photo3/DSC00903.jpg", "photo3/DSC02400.jpg", "photo3/DSC02410.jpg", "photo3/DSC02444.jpg", "photo3/DSC02745-Enhanced-NR.jpg", "photo3/DSC02838.jpg", "photo3/DSC04991-Enhanced-NR-2.jpg", "photo3/DSC05107-Enhanced-NR-3.jpg", "photo3/DSC05146-Enhanced-NR-2.jpg", "photo3/DSC05722-Enhanced-NR.jpg", "photo3/DSC05737-Enhanced-NR.jpg", "photo3/DSC05741-Enhanced-NR.jpg", "photo3/DSC05749-Enhanced-NR.jpg", "photo3/DSC05806-Enhanced-NR.jpg",

            "photo6/f46726912.jpg", "photo6/f47408064-Enhanced-NR.jpg", "photo6/f48088704-Enhanced-NR.jpg", "photo6/f49206656-Enhanced-NR.jpg", "photo6/f49401344.jpg", "photo6/f49595648.jpg", "photo6/f52467456-Enhanced-NR.jpg", "photo6/f52710464-Enhanced-NR.jpg", "photo6/f55780416-Enhanced-NR.jpg", "photo6/IMG_2455-Enhanced-NR.jpg", "photo6/miniature edit 1.png"
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        shuffle(photos);

        const grid = document.getElementById('catalogGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('.lightbox-img');

        photos.forEach(photo => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            const img = new Image();
            img.src = photo;
            img.loading = 'lazy';
            img.onload = () => { img.style.opacity = '1'; };

            item.appendChild(img);
            grid.appendChild(item);

            item.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
                document.body.classList.add('lightbox-open');
            });
        });

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.classList.remove('lightbox-open');
        };

        lightbox.addEventListener('click', closeLightbox);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

        let lastScrollTop = 0;
        const header = document.querySelector('.header');
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                header.classList.add('nav-hidden');
            } else {
                header.classList.remove('nav-hidden');
            }
            lastScrollTop = scrollTop;
        });
    </script>
</body>

</html>
